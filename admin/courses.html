<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --brand: #1a1a2e; --accent: #e94560; --gold: #f5a623;
            --surface: #fff; --bg: #f3f1eb; --surface-alt: #f8f7f4;
            --text-primary: #1a1a2e; --text-muted: #6b7280;
            --border: rgba(0,0,0,0.08); --sidebar-w: 240px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: var(--brand); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
        .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .sidebar-logo .badge { display: flex; align-items: center; gap: 10px; }
        .sidebar-logo .icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .sidebar-logo .title { color: #fff; font-weight: 500; font-size: 14px; }
        .sidebar-logo .subtitle { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 1px; }
        .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
        .nav-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 12px 12px 6px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; color: rgba(255,255,255,0.55); font-size: 14px; text-decoration: none; transition: all 0.18s; }
        .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
        .nav-item.active { background: rgba(233,69,96,0.15); color: #fff; font-weight: 500; }
        .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
        .nav-item.active .nav-icon, .nav-item:hover .nav-icon { opacity: 1; }
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.07); }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(233,69,96,0.2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--accent); }
        .user-name { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500; }
        .user-role { color: rgba(255,255,255,0.35); font-size: 11px; }
        .logout-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; margin-top: 4px; transition: all 0.18s; }
        .logout-btn:hover { background: rgba(233,69,96,0.1); color: var(--accent); }
        .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; }
        .content { padding: 32px; }
        .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
        .search-wrap input { width: 100%; padding: 10px 14px 10px 38px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); outline: none; transition: border-color 0.2s; }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: #c5c9d4; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #b0b7c3; }
        .filter-select { padding: 10px 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); outline: none; cursor: pointer; transition: border-color 0.2s; }
        .filter-select:focus { border-color: var(--accent); }
        .btn-primary { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--brand); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; margin-left: auto; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,26,46,0.2); }

        /* Course cards grid */
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .course-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .course-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.09); }
        .course-card-top { height: 6px; }
        .course-card-body { padding: 20px; }
        .course-code-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .course-code { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; background: var(--surface-alt); color: var(--text-muted); font-family: monospace; }
        .credits-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: #eeedfe; color: #534ab7; font-weight: 500; }
        .course-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; line-height: 1.3; }
        .course-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .meta-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
        .dept-cs { background: #e6f1fb; color: #185fa5; }
        .dept-ec { background: #fce9ec; color: #c53030; }
        .dept-me { background: #fef3dc; color: #b45309; }
        .sem-pill { background: var(--surface-alt); color: var(--text-muted); }
        .teacher-row { display: flex; align-items: center; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); margin-bottom: 14px; }
        .teacher-mini-avatar { width: 24px; height: 24px; border-radius: 50%; background: #e1f5ee; color: #0f6e56; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; }
        .teacher-name { font-size: 13px; color: var(--text-muted); }
        .card-actions { display: flex; gap: 8px; }
        .btn-sm { padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; flex: 1; text-align: center; }
        .btn-edit   { background: var(--surface-alt); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-edit:hover { border-color: var(--accent); color: var(--accent); }
        .btn-delete { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
        .btn-delete:hover { background: #fed7d7; }
        .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); grid-column: 1/-1; }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: 16px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.2); }
        .modal-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); transition: color 0.15s; }
        .modal-close:hover { color: var(--accent); }
        .modal-body { padding: 24px 28px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-primary); background: #fafaf8; border: 1.5px solid var(--border); border-radius: 10px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(233,69,96,0.08); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .modal-footer { padding: 16px 28px 24px; display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel { padding: 10px 20px; background: var(--surface-alt); color: var(--text-muted); border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
        .btn-save { padding: 10px 24px; background: var(--brand); color: #fff; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: transform 0.15s, box-shadow 0.2s; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,26,46,0.2); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-logo">
        <div class="badge">
            <div class="icon">🎓</div>
            <div><div class="title">CMS Portal</div><div class="subtitle">Admin Dashboard</div></div>
        </div>
    </div>
    <div class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a href="dashboard.html" class="nav-item">
            <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
        </a>
        <a href="students.html" class="nav-item">
            <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Students
        </a>
        <a href="teachers.html" class="nav-item">
            <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

        </div>
        <div class="logout-btn" id="logoutBtn">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>

        </div>

</nav>

<div class="main">
    <div class="topbar">
        <h1>Courses</h1>
        <button class="btn-primary" onclick="showAddModal()">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Course
        </button>
    </div>
    <div class="content">
        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></span>
                <input type="text" id="searchInput" placeholder="Search courses…" oninput="filterCourses()">
            </div>
            <select class="filter-select" id="deptFilter" onchange="filterCourses()">
                <option value="">All Departments</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Electronics">Electronics</option>
                <option value="Mechanical">Mechanical</option>
            </select>
        </div>
        <div class="courses-grid" id="coursesGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">Add Course</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="courseCode" placeholder="e.g. CS301" required>
                </div>
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" id="courseName" placeholder="Course title" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Department</label>
                    <select id="department">
                        <option value="Computer Science">Computer Science</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Mechanical">Mechanical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Semester</label>
                    <input type="number" id="semester" min="1" max="8" placeholder="1–8" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" id="credits" min="1" max="6" placeholder="1–6" required>
                </div>
                <div class="form-group">
                    <label class="required">Assign Teacher</label>
                    <select id="teacherId" required>
                        <option value="">Select Teacher</option>
                    </select>
                    <div id="teacherError" class="error-msg" style="display:none;">Please select a teacher</div>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Brief course description…"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveCourse()">Save Course</button>
        </div>
    </div>
</div>

<script src="../js/auth.js"></script>
<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    document.getElementById('userName').textContent = user.name || 'Admin';
    document.getElementById('userInitials').textContent = (user.name || 'A')[0].toUpperCase();
    document.getElementById('logoutBtn').addEventListener('click', () => { 
        localStorage.clear(); 
        window.location.href = '../login.html'; 
    });

    let editingId = null;
    let allCourses = [];
    let teachersList = [];

    const deptClass = { 'Computer Science': 'dept-cs', 'Electronics': 'dept-ec', 'Mechanical': 'dept-me' };
    const deptColors = { 'Computer Science': '#378add', 'Electronics': '#e94560', 'Mechanical': '#f5a623' };

    async function init() {
        // Load teachers
        const res = await fetch('http://localhost:5000/api/teachers', { 
            headers: { Authorization: `Bearer ${token}` } 
        });
        
        if (res.ok) {
            teachersList = await res.json();
            populateTeacherDropdown();
        } else {
            console.error("Failed to load teachers");
        }
        
        await loadCourses();
    }

    function populateTeacherDropdown() {
        const sel = document.getElementById('teacherId');
        sel.innerHTML = '<option value="">Select Teacher</option>' + 
            teachersList.map(t => {
                const name = t.userId?.name || 'Unknown';
                return `<option value="${t._id}">${name} (${t.department || 'N/A'})</option>`;
            }).join('');
    }

    async function loadCourses() {
    try {
        const res = await fetch('http://localhost:5000/api/courses', { 
            headers: { Authorization: `Bearer ${token}` } 
        });
        
        if (!res.ok) throw new Error('Failed to load courses');
        
        allCourses = await res.json();
        renderCourses(allCourses);
    } catch (error) {
        console.error(error);
        document.getElementById('coursesGrid').innerHTML = `
            <div class="empty-state" style="color:#e94560;">
                <div class="icon">⚠️</div>
                <p>Error loading courses. Please refresh.</p>
            </div>`;
    }
}

    function renderCourses(courses) {
    const grid = document.getElementById('coursesGrid');
    
    if (!courses || courses.length === 0) {
        grid.innerHTML = `<div class="empty-state">
            <div class="icon">📚</div>
            <p>No courses found. Add your first course!</p>
        </div>`;
        return;
    }

    grid.innerHTML = courses.map(c => {
        // Improved teacher lookup - handle both cases:
        // 1. teacherId is ObjectId string
        // 2. teacherId is already populated object
        let teacher = null;
        
        if (c.teacherId) {
            if (typeof c.teacherId === 'object' && c.teacherId.userId) {
                // Already populated (from backend populate)
                teacher = c.teacherId;
            } else {
                // teacherId is just ID (string or ObjectId) → find from teachersList
                teacher = teachersList.find(t => t._id === c.teacherId || t._id.toString() === c.teacherId);
            }
        }

        const color = deptColors[c.department] || '#888';
        const teacherName = teacher && teacher.userId 
            ? teacher.userId.name 
            : (teacher ? teacher.name : 'No teacher assigned');

        const teacherInitial = teacherName !== 'No teacher assigned' 
            ? teacherName[0].toUpperCase() 
            : '–';

        return `
        <div class="course-card" style="animation: fadeUp 0.35s ease both;">
            <div class="course-card-top" style="background:${color};"></div>
            <div class="course-card-body">
                <div class="course-code-row">
                    <span class="course-code">${c.courseCode}</span>
                    <span class="credits-badge">${c.credits} Credits</span>
                </div>
                <div class="course-name">${c.courseName}</div>
                <div class="course-meta">
                    <span class="meta-pill ${deptClass[c.department] || ''}">${c.department}</span>
                    <span class="meta-pill sem-pill">Semester ${c.semester}</span>
                </div>
                
                <div class="teacher-row">
                    <div class="teacher-mini-avatar">${teacherInitial}</div>
                    <span class="teacher-name">${teacherName}</span>
                </div>
                
                <div class="card-actions">
                    <button class="btn-sm btn-edit" onclick="editCourse('${c._id}')">Edit</button>
                    <button class="btn-sm btn-delete" onclick="deleteCourse('${c._id}')">Delete</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

    function filterCourses() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const dept = document.getElementById('deptFilter').value;

    const filtered = allCourses.filter(c => {

        const courseDept = (c.department || '').toLowerCase();

        const matchDept =
            !dept ||
            courseDept.includes(dept.toLowerCase());

        const matchSearch =
            (c.courseName || '').toLowerCase().includes(q) ||
            (c.courseCode || '').toLowerCase().includes(q);

        return matchDept && matchSearch;
    });
console.log(allCourses.map(c => c.department));
    renderCourses(filtered);
}

    function showAddModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Add New Course';
        document.querySelectorAll('input, select, textarea').forEach(el => {
            if (el.id !== 'department' && el.id !== 'teacherId') el.value = '';
        });
        document.getElementById('department').value = 'Computer Science';
        document.getElementById('teacherId').value = '';
        document.getElementById('teacherError').style.display = 'none';
        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
        document.getElementById('teacherError').style.display = 'none';
    }

    async function editCourse(id) {
        const res = await fetch(`http://localhost:5000/api/courses/${id}`, { 
            headers: { Authorization: `Bearer ${token}` } 
        });
        const c = await res.json();
        
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Edit Course';
        document.getElementById('courseCode').value = c.courseCode || '';
        document.getElementById('courseName').value = c.courseName || '';
        document.getElementById('department').value = c.department || 'Computer Science';
        document.getElementById('semester').value = c.semester || '';
        document.getElementById('credits').value = c.credits || '';
        document.getElementById('teacherId').value = c.teacherId || '';
        document.getElementById('description').value = c.description || '';
        
        document.getElementById('modalOverlay').classList.add('open');
    }

    async function deleteCourse(id) {
        if (!confirm('Are you sure you want to delete this course?')) return;
        
        await fetch(`http://localhost:5000/api/courses/${id}`, { 
            method: 'DELETE', 
            headers: { Authorization: `Bearer ${token}` } 
        });
        loadCourses();
    }

    async function saveCourse() {
        const teacherSelect = document.getElementById('teacherId');
        const errorDiv = document.getElementById('teacherError');

        // Validation: Teacher is now mandatory
        if (!teacherSelect.value) {
            errorDiv.style.display = 'block';
            teacherSelect.focus();
            return;
        } else {
            errorDiv.style.display = 'none';
        }

        const data = {
            courseCode: document.getElementById('courseCode').value.trim(),
            courseName: document.getElementById('courseName').value.trim(),
            department: document.getElementById('department').value,
            semester: parseInt(document.getElementById('semester').value),
            credits: parseInt(document.getElementById('credits').value),
            teacherId: document.getElementById('teacherId').value,        // Now mandatory
            description: document.getElementById('description').value.trim()
        };

        // Basic validation
        if (!data.courseCode || !data.courseName || !data.semester || !data.credits) {
            alert("Please fill all required fields");
            return;
        }

        const url = editingId 
            ? `http://localhost:5000/api/courses/${editingId}` 
            : 'http://localhost:5000/api/courses';
        
        const method = editingId ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method,
                headers: { 
                    'Content-Type': 'application/json', 
                    Authorization: `Bearer ${token}` 
                },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeModal();
                loadCourses();
            } else {
                const err = await res.json();
                alert(err.error || "Failed to save course");
            }
        } catch (error) {
            console.error(error);
            alert("Something went wrong. Please try again.");
        }
    }

    init();
</script>
</body>
</html>
