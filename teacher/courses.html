<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Courses — Teacher</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="dashboard-container">

  <nav class="sidebar">
    <div class="sidebar-header"><h2>Teacher Portal</h2></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">🏠&nbsp; Dashboard</a></li>
      <li><a href="courses.html" class="active">📚&nbsp; My Courses</a></li>
      <li><a href="attendance.html">📝&nbsp; Mark Attendance</a></li>
      <li><a href="grades.html">📊&nbsp; Enter Grades</a></li>
      <li><a href="resources.html">📄&nbsp; Upload Resources</a></li>
      <li><a href="#" id="logoutBtn">🚪&nbsp; Logout</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header>
      <h1>My Courses</h1>
      <div class="user-info">
        <span id="userName">Loading…</span>
        <span class="role-badge">Teacher</span>
      </div>
    </header>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Course Code</th>
            <th>Course Name</th>
            <th>Department</th>
            <th>Semester</th>
            <th>Credits</th>
          </tr>
        </thead>
        <tbody id="coursesList">
          <tr>
            <td colspan="5" style="text-align:center;padding:60px;color:var(--text-dim)">
              <div class="empty-state-icon">📚</div>
              <p>Loading courses…</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  (async () => {
    const token = localStorage.getItem('token');
    if (!token) return window.location.href = '../login.html';

    const user = getCurrentUser();
    document.getElementById('userName').textContent = user?.name || 'Teacher';

    try {
      const res = await fetch('http://localhost:5000/api/courses/my', {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!res.ok) throw new Error('Failed');
      const courses = await res.json();
      const tbody = document.getElementById('coursesList');

      if (!courses.length) {
        tbody.innerHTML = `
          <tr><td colspan="5">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <h4>No Courses Assigned</h4>
              <p>Contact the administrator to assign courses to your profile.</p>
            </div>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = courses.map(c => `
        <tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:0.82rem;color:var(--burg);font-weight:600">${c.courseCode || '—'}</td>
          <td style="color:var(--text);font-weight:500">${c.courseName || '—'}</td>
          <td>${c.department || '—'}</td>
          <td><span class="status-badge status-present">Sem ${c.semester || '—'}</span></td>
          <td style="font-weight:600">${c.credits || '—'}</td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('coursesList').innerHTML = `
        <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--red)">
          Failed to load courses. Please try again.
        </td></tr>`;
    }
  })();

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault(); localStorage.clear(); window.location.href = '../login.html';
  });
</script>
</body>
</html>
