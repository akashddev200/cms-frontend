<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Student</title>
  <link rel="stylesheet" href="../student/css/style.css" />
</head>
<body>
<div class="dashboard-container">

  <nav class="sidebar">
    <div class="sidebar-header"><h2>Student Portal</h2></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">🏠&nbsp; Dashboard</a></li>
      <li><a href="profile.html" class="active">👤&nbsp; My Profile</a></li>
      <li><a href="attendance.html">📊&nbsp; Attendance</a></li>
      <li><a href="grades.html">🎓&nbsp; Grades</a></li>
      <li><a href="resources.html">📚&nbsp; Resources</a></li>
      <li><a href="timetable.html">📅&nbsp; Timetable</a></li>
      <li><a href="fees.html">💰&nbsp; Fees</a></li>
      <li><a href="#" id="logoutBtn">🚪&nbsp; Logout</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header>
      <h1>My Profile</h1>
      <div class="user-info">
        <span id="userName">Loading…</span>
        <span class="role-badge">Student</span>
      </div>
    </header>

    <div class="dashboard-card">
      <h2>Personal Information</h2>
      <div class="profile-info" id="personalInfo">
        <div class="empty-state"><p>Loading…</p></div>
      </div>
    </div>

    <div class="dashboard-card" style="margin-top:20px">
      <h2>Academic Information</h2>
      <div class="profile-info" id="academicInfo">
        <div class="empty-state"><p>Loading…</p></div>
      </div>
    </div>

    <div class="dashboard-card" style="margin-top:20px">
      <h2>Contact Information</h2>
      <div class="profile-info" id="contactInfo">
        <div class="empty-state"><p>Loading…</p></div>
      </div>
    </div>

    <button class="btn btn-primary" style="margin-top:24px" onclick="location.href='dashboard.html'">← Back to Dashboard</button>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
  const token = localStorage.getItem('token');

  async function loadProfile() {
    try {
      const res = await fetch('http://localhost:5000/api/students/me', {
        headers: { Authorization: `Bearer ${token}` }
      });
      const user = await res.json();

      document.getElementById('userName').textContent = user.userId?.name || 'Student';

      document.getElementById('personalInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Full Name</span><span class="info-value">${user.userId?.name || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value">${user.userId?.email || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Date of Birth</span><span class="info-value">${user.dateOfBirth || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Blood Group</span><span class="info-value">${user.bloodGroup || 'Not Provided'}</span></div>
      `;

      document.getElementById('academicInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Roll Number</span><span class="info-value">${user.rollNumber || 'Not Assigned'}</span></div>
        <div class="info-row"><span class="info-label">Department</span><span class="info-value">${user.department || 'Not Assigned'}</span></div>
        <div class="info-row"><span class="info-label">Semester</span><span class="info-value">${user.semester || 'Not Assigned'}</span></div>
        <div class="info-row"><span class="info-label">Batch</span><span class="info-value">${user.batch || 'Not Assigned'}</span></div>
        <div class="info-row"><span class="info-label">Enrollment Year</span><span class="info-value">${user.enrollmentYear || 'Not Assigned'}</span></div>
      `;

      document.getElementById('contactInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${user.phone || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Address</span><span class="info-value">${user.address || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Parent / Guardian</span><span class="info-value">${user.parentName || 'Not Provided'}</span></div>
        <div class="info-row"><span class="info-label">Parent Phone</span><span class="info-value">${user.parentPhone || 'Not Provided'}</span></div>
      `;
    } catch (err) {
      console.error(err);
      alert('Failed to load profile');
    }
  }

  loadProfile();

  document.getElementById('logoutBtn').addEventListener('click', e => {
    e.preventDefault();
    localStorage.clear();
    window.location.href = '../login.html';
  });
</script>
</body>
</html>
