<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Resources</title>
  <link rel="stylesheet" href="../student/css/style.css" />
  <style>
    .resource-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8f9fa;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #e9ecef;
    }
    .resource-title {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }
    .btn-download {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-download:hover {
      background: #0056b3;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
<div class="dashboard-container">
  <nav class="sidebar">
    <div class="sidebar-header"><h2>Student Portal</h2></div>
    <ul class="sidebar-menu">
      <li><a href="dashboard.html">🏠 Dashboard</a></li>
      <li><a href="profile.html">👤 My Profile</a></li>
      <li><a href="attendance.html">📊 Attendance</a></li>
      <li><a href="grades.html">🎓 Grades</a></li>
      <li><a href="resources.html" class="active">📚 Resources</a></li>
      <li><a href="#" id="logoutBtn">🚪 Logout</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header>
      <h1>Study Resources</h1>
      <div class="user-info">
        <span id="userName">Loading…</span>
        <span class="role-badge">Student</span>
      </div>
    </header>

    <div class="dashboard-card" id="resourcesContainer">
      <!-- Content will be loaded dynamically -->
    </div>
  </div>
</div>

<script src="../js/auth.js"></script>

<script>
(async () => {
  const container = document.getElementById('resourcesContainer');
  const token = localStorage.getItem('token');

  function showMessage(title, msg) {
    container.innerHTML = `
      <div class="empty-state">
        <h4>${title}</h4>
        <p style="color:#666">${msg}</p>
      </div>
    `;
  }

  if (!token) {
    showMessage("Login Required", "Please login first to view resources.");
    return;
  }

  container.innerHTML = `
    <div class="loading">
      <p>🔄 Loading study resources...</p>
    </div>
  `;

  try {
    const res = await fetch('http://localhost:5000/api/resources/student', {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`
      }
    });

    console.log("Status:", res.status);

    let data;
    try {
      data = await res.json();
    } catch (err) {
      throw new Error("Invalid JSON response from backend");
    }

    console.log("Resources:", data);

    if (!res.ok) {
      throw new Error(data.message || "Failed to fetch resources");
    }

    if (!Array.isArray(data) || data.length === 0) {
      showMessage(
        "No Resources Found",
        "Either no uploads exist OR your department/semester mismatch."
      );
      return;
    }

    let html = `
      <h2 style="margin-bottom:20px">
        📚 Study Materials (${data.length})
      </h2>
    `;

    data.forEach(r => {
      html += `
        <div class="resource-item">
          <div style="flex:1">
            <div class="resource-title">${escapeHtml(r.title || "Untitled")}</div>

            <div style="font-size:0.85rem;color:#666;margin:5px 0;">
              ${escapeHtml(r.description || "No description")}
            </div>

            <div style="font-size:0.82rem;color:#555;">
              📘 ${r.department || "N/A"} | Semester ${r.semester || "N/A"}
            </div>

            ${r.courseId?.courseName ? `
              <div style="color:#007bff;font-size:0.85rem;margin-top:4px;">
                Course: ${r.courseId.courseName}
              </div>
            ` : ""}
          </div>

          <a href="http://localhost:5000/uploads/${r.fileUrl}" target="_blank">
            <button class="btn-download">Download</button>
          </a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    console.error("ERROR:", err);
    showMessage(
      "Error Loading Resources",
      err.message + "<br>Check backend is running on port 5000"
    );
  }

  // ✅ Prevent HTML injection issues
  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

})();
</script>
</body>
</html>
